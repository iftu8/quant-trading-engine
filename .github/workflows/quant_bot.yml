name: ApexQuant Engine Automation

# Koto bar o kokhon ei code run hobe ta nirdharon kora
on:
  push:
    branches:
      - main # Main branch e kono code push korlei run hobe
  workflow_dispatch: # Apni chaile 'Actions' tab theke manually run korte parben
  schedule:
    - cron: '0 0 * * *' # Protidin rat 12 tay (UTC) automatically run hobe (Trading bot er jonno darun)

jobs:
  run-quant-and-gemini:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy google-generativeai
          
          # Jodi apnar repository te requirements.txt thake, tahole uporer line tar bodole nicher line ta theke '#' kete diben:
          # pip install -r requirements.txt

      - name: 🚀 Run ApexQuant Main Script
        env:
          # Eikhane GitHub apnar secret theke API key ta niye main.py ke dibe
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
